name: Build Ren'Py APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 安装 Java
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk-headless

      - name: 下载 Ren'Py SDK
        run: |
          wget -q https://www.renpy.org/dl/8.3.3/renpy-8.3.3-sdk.tar.bz2
          tar -xjf renpy-8.3.3-sdk.tar.bz2

      - name: 构建 APK
        run: |
          ./renpy-8.3.3-sdk/renpy.sh launcher distribute $GITHUB_WORKSPACE

      - name: 收集 APK
        run: |
          mkdir output
          cp *.apk output/ 2>/dev/null || true
          cp $GITHUB_WORKSPACE/*.apk output/ 2>/dev/null || true
          ls -la output/

      - uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: output/
