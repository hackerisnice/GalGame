name: Build Ren'Py APK
on:
  workflow_dispatch:

env:
  ANDROID_NDK_HOME: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Java 21 与 Unzip 工具
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-21-jdk-headless unzip

      - name: 下载 Ren'Py SDK 与 RAPT 安卓扩展包
        run: |
          # 下载 8.5.3 版本的引擎本体
          wget -q https://www.renpy.org/dl/8.5.3/renpy-8.5.3-sdk.tar.bz2
          tar -xjf renpy-8.5.3-sdk.tar.bz2
          
          # 下载 8.5.3 版本的 RAPT 安卓扩展包
          wget -q https://www.renpy.org/dl/8.5.3/renpy-8.5.3-rapt.zip
          unzip -q renpy-8.5.3-rapt.zip

      - name: 构建 APK
        env:
          RENPY_NO_GRAPHICS: 1
        run: |
          mkdir -p output
          # 路径已全部同步更新为 renpy-8.5.3-sdk
          yes "yes" | renpy-8.5.3-sdk/renpy.sh renpy-8.5.3-sdk/launcher android_build $GITHUB_WORKSPACE --dest output

      - name: 收集 APK
        run: |
          ls -la output/

      - uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: output/**/*.apk
