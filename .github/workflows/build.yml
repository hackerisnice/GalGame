name: Build Ren'Py APK
on:
  workflow_dispatch:

env:
  # 关键修复 1：必须清空自带 NDK，强制使用 Ren'Py 自己的编译链
  ANDROID_NDK_HOME: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # 顺手帮你升级到最新的 v4 检出组件

      - name: 安装 Java 21
        run: |
          sudo apt-get update
          # 关键修复 2：Ren'Py 8.3.3 需要 Java 21
          sudo apt-get install -y openjdk-21-jdk-headless

      - name: 下载 Ren'Py SDK
        run: |
          wget -q https://www.renpy.org/dl/8.3.3/renpy-8.3.3-sdk.tar.bz2
          tar -xjf renpy-8.3.3-sdk.tar.bz2

      - name: 安装安卓构建环境 (RAPT)
        run: |
          # 关键修复 3：手动触发安卓 SDK 安装，并用 yes 命令一路自动同意许可协议
          yes | renpy-8.3.3-sdk/renpy.sh launcher android_installsdk

      - name: 构建 APK
        env:
          RENPY_NO_GRAPHICS: 1
        run: |
          mkdir -p output
          # 关键修复 4：改为专用的 android_build 命令，并用 --dest 直接指定输出目录
          renpy-8.3.3-sdk/renpy.sh launcher android_build $GITHUB_WORKSPACE --dest output

      - name: 收集 APK
        run: |
          ls -la output/

      - uses: actions/upload-artifact@v4
        with:
          name: game-apk
          # 关键修复 5：因为前面直接指定了输出目录，这里直接抓取 output 下的 apk 即可，不再需要到处 cp
          path: output/**/*.apk
