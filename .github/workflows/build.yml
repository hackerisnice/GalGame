name: Build Ren'Py Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Java 21 环境
        # Ren'Py 8.2+ 强制要求使用 Java 21 来编译 Android
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21' 

      - name: 自动配置并编译 Android APK
        # 使用专用的 Ren'Py 构建 Action
        uses: Ayowel/renpy-setup-action@v2.0.1
        env:
          # 核心跳坑点：清空 GitHub 默认的 NDK 环境变量，强制让插件使用 Ren'Py 自己的 NDK 编译，防止冲突
          ANDROID_NDK_HOME: ''
        with:
          action: android_build
          game: .
          out_dir: build_output

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: renpy-android-apk
          # 提取打包出来的所有 apk 文件
          path: build_output/**/*.apk
